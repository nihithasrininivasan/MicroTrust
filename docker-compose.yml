version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      - ml-service

  ml-service:
    build:
      context: .
      dockerfile: docker/ml.Dockerfile
    ports:
      - "8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
