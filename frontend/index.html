<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MicroTrust - Financial Identity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #F6F4EF;
        --surface-color: #FFFFFF;
        --accent-orange: #EA580C; /* Premium Burnt Orange */
        --dark-orange: #C2410C;
        --text-primary: #1C1C1C;
        --text-secondary: #6B6B6B;
        --nm-light: rgba(255, 255, 255, 0.8);
        --nm-dark: rgba(0, 0, 0, 0.05);
      }

      body {
        font-family: 'Quicksand', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        letter-spacing: 0.015em;
      }

      /* Neumorphic Shadows */
      .nm-flat {
        background: var(--surface-color);
        box-shadow: 6px 6px 12px var(--nm-dark), -6px -6px 12px var(--nm-light);
      }

      .nm-flat-sm {
        background: var(--surface-color);
        box-shadow: 4px 4px 8px var(--nm-dark), -4px -4px 8px var(--nm-light);
      }

      .nm-inset {
        background: var(--bg-color);
        box-shadow: inset 4px 4px 8px var(--nm-dark), inset -4px -4px 8px var(--nm-light);
      }

      .nm-pressed:active {
        box-shadow: inset 4px 4px 8px var(--nm-dark), inset -4px -4px 8px var(--nm-light);
        transform: scale(0.98);
      }

      .nm-orange {
        background: var(--accent-orange);
        box-shadow: 4px 4px 10px rgba(234, 88, 12, 0.3), -4px -4px 10px rgba(255, 255, 255, 0.5);
      }

      .nm-orange-pressed:active {
        box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.1), inset -4px -4px 8px rgba(255, 255, 255, 0.2);
        transform: scale(0.98);
      }

      /* Custom animations */
      .transition-nm {
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Hide scrollbar */
      ::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
