services:
  # ── Backend API (Node.js / Express) ──────────────────────────────────────
  - type: web
    name: microtrust-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_VERSION
        value: 20.11.0

  # ── ML Service (Python / FastAPI) ────────────────────────────────────────
  - type: web
    name: microtrust-ml
    env: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt && python -m pipeline.train_model
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
